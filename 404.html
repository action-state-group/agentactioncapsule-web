<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Agent Action Capsule</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0E14">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0B0E14;--paper:#FCFCFA;--line:#E3E3DC;--muted:#5C6573;--accent:#3A5BD9;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
  .glyph{width:34px;height:34px;border:2px solid var(--ink);border-radius:7px;position:relative;margin:0 auto 22px}
  .glyph::after{content:'';position:absolute;inset:6px;border-left:2px solid var(--accent);border-bottom:2px solid var(--accent);transform:rotate(-45deg) translate(1px,-1px)}
  .code{font-family:var(--mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  h1{font-size:clamp(26px,4vw,34px);letter-spacing:-0.6px;margin-bottom:12px}
  p{color:var(--muted);font-size:16px;max-width:48ch;margin:0 auto 26px}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .links a{font-size:14px;text-decoration:none;color:var(--ink);border:1px solid var(--line);padding:10px 18px;border-radius:9px}
  .links a:hover{border-color:var(--ink)}
  .links a.p{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>
</head>
<body>
  <div>
    <div class="glyph"></div>
    <div class="code">404 · not found</div>
    <h1>That page doesn't exist.</h1>
    <p>The link may be old or mistyped. Here's the way back to the standard, the docs, and the live log.</p>
    <div class="links">
      <a class="p" href="/">Home</a>
      <a href="/docs/">Docs</a>
      <a href="/docs/explore.html">Explore a capsule</a>
      <a href="/docs/log.html">The public log</a>
    </div>
  </div>
</body>
</html>
