server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Pretty URLs: /docs/ and /docs -> /docs/index.html; /docs/page -> /docs/page.html
    # ($uri/index.html resolves the directory index reliably; bare $uri/ left it empty in prod)
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTML must always revalidate — the custom-domain edge (Google Frontend) was
    # serving stale .html after deploys (the quickstart fix shipped to run.app but
    # agentactioncapsule.org kept serving the old cached page). no-store on HTML
    # forces fresh content; static assets can still be cached normally.
    location ~* \.(html|xml|txt)$ {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
